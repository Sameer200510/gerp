version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: college_erp_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: college_erp
    ports:
      - "5440:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: college_erp_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
